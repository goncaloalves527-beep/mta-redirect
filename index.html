<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CoreBot • Secure System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050816;
color:white;
overflow:hidden;
}

/* BACKGROUND */
.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%,#5865F2 0%,transparent 40%),
radial-gradient(circle at 80% 80%,#7c3aed 0%,transparent 40%),
radial-gradient(circle at center,#00c2ff 0%,transparent 60%),
#050816;
z-index:-3;
}

/* PARTICLES */
.particles{
position:fixed;
inset:0;
overflow:hidden;
z-index:-2;
}

.particles span{
position:absolute;
width:6px;
height:6px;
background:white;
border-radius:50%;
opacity:0.2;
animation:move 12s linear infinite;
}

@keyframes move{
0%{transform:translateY(0) translateX(0);opacity:0;}
20%{opacity:0.3;}
100%{transform:translateY(-100vh) translateX(40px);opacity:0;}
}

/* GLOW */
.glow{
position:absolute;
filter:blur(220px);
opacity:0.25;
border-radius:50%;
}

.g1{width:500px;height:500px;background:#5865F2;top:-200px;left:-200px;}
.g2{width:500px;height:500px;background:#7c3aed;bottom:-200px;right:-200px;}

/* CENTER */
.container{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

/* CARD */
.card{
width:900px;
padding:85px 60px;
border-radius:30px;

/* GLASS REAL */
background:rgba(255,255,255,0.06);
backdrop-filter:blur(30px);
border:1px solid rgba(255,255,255,0.12);
box-shadow:
0 40px 120px rgba(0,0,0,0.7),
inset 0 1px 0 rgba(255,255,255,0.15);

text-align:center;
transform:perspective(1000px) rotateX(6deg);
animation:float 6s ease-in-out infinite;
position:relative;
overflow:hidden;
}

/* SHINE EFFECT */
.card::before{
content:'';
position:absolute;
top:-50%;
left:-50%;
width:200%;
height:200%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.08),transparent);
transform:rotate(25deg);
animation:shine 6s infinite linear;
}

@keyframes shine{
0%{transform:translateX(-100%) rotate(25deg);}
100%{transform:translateX(100%) rotate(25deg);}
}

@keyframes float{
0%{transform:translateY(0) perspective(1000px) rotateX(6deg);}
50%{transform:translateY(-12px) perspective(1000px) rotateX(6deg);}
100%{transform:translateY(0) perspective(1000px) rotateX(6deg);}
}

/* TITLE */
h1{
font-size:88px;
font-weight:900;
background:linear-gradient(90deg,#5865F2,#7c3aed,#00c2ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
letter-spacing:-2px;
}

/* TEXT */
p{
margin-top:15px;
font-size:18px;
color:#cbd5e1;
line-height:1.7;
max-width:700px;
margin-inline:auto;
}

/* BUTTONS */
.buttons{
margin-top:35px;
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

.btn{
padding:14px 32px;
border-radius:14px;
font-weight:600;
text-decoration:none;
font-size:15px;
transition:0.3s;
position:relative;
overflow:hidden;
}

/* BUTTON PRIMARY */
.primary{
background:linear-gradient(90deg,#5865F2,#7c3aed);
color:white;
box-shadow:0 0 40px rgba(88,101,242,0.35);
}

.primary:hover{
transform:translateY(-5px) scale(1.03);
box-shadow:0 0 70px rgba(88,101,242,0.7);
}

/* BUTTON SECONDARY */
.secondary{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.2);
color:white;
}

.secondary:hover{
transform:translateY(-5px);
border-color:#5865F2;
}

/* STATUS */
.status{
margin-top:25px;
font-size:13px;
color:#94a3b8;
}

.dot{
width:8px;
height:8px;
background:#22c55e;
border-radius:50%;
display:inline-block;
margin-right:6px;
box-shadow:0 0 10px #22c55e;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="particles">
<script>
for(let i=0;i<40;i++){
let s=document.createElement("span");
s.style.left=Math.random()*100+"%";
s.style.top=Math.random()*100+"%";
s.style.animationDuration=(5+Math.random()*10)+"s";
document.currentScript.parentElement.appendChild(s);
}
</script>
</div>

<div class="glow g1"></div>
<div class="glow g2"></div>

<div class="container">

<div class="card">

<h1>CoreBot</h1>

<p>
Sistema de verificação Discord seguro e moderno.
Autenticação, proteção e controlo de servidores num só lugar.
</p>

<div class="buttons">

<a class="btn primary"
href="https://discord.com/oauth2/authorize?client_id=1500189077818052662&response_type=code&scope=identify%20guilds">
🔐 Login Discord
</a>

<a class="btn secondary"
href="https://discord.com/oauth2/authorize?client_id=1500189077818052662&permissions=8&scope=bot">
➕ Adicionar Bot
</a>

</div>

<div class="status">
<span class="dot"></span> Sistema seguro ativo
</div>

</div>

</div>

</body>
</html>
