<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CoreBot • Secure Access</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<!-- CAPTCHA -->
<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050816;
color:white;
overflow:hidden;
}

/* BACKGROUND */
.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%,#5865F2 0%,transparent 40%),
radial-gradient(circle at 80% 80%,#7c3aed 0%,transparent 40%),
radial-gradient(circle at center,#00c2ff 0%,transparent 60%),
#050816;
z-index:-3;
}

.glow{
position:absolute;
filter:blur(220px);
opacity:0.25;
border-radius:50%;
}

.g1{width:500px;height:500px;background:#5865F2;top:-200px;left:-200px;}
.g2{width:500px;height:500px;background:#7c3aed;bottom:-200px;right:-200px;}

/* CONTAINER */
.container{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

/* CARD */
.card{
width:900px;
padding:70px 60px;
border-radius:30px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(30px);
border:1px solid rgba(255,255,255,0.12);
box-shadow:0 50px 140px rgba(0,0,0,0.7);
text-align:center;
transform:perspective(1000px) rotateX(5deg);
animation:float 6s ease-in-out infinite;
position:relative;
overflow:hidden;
}

@keyframes float{
0%{transform:translateY(0) perspective(1000px) rotateX(5deg);}
50%{transform:translateY(-12px) perspective(1000px) rotateX(5deg);}
100%{transform:translateY(0) perspective(1000px) rotateX(5deg);}
}

/* TITLE */
h1{
font-size:80px;
font-weight:900;
background:linear-gradient(90deg,#5865F2,#7c3aed,#00c2ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

p{
margin-top:10px;
font-size:18px;
color:#cbd5e1;
}

/* BUTTONS */
.buttons{
margin-top:30px;
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

.btn{
padding:14px 30px;
border-radius:14px;
font-weight:600;
text-decoration:none;
font-size:15px;
transition:0.2s;
cursor:pointer;
display:inline-block;
}

.primary{
background:linear-gradient(90deg,#5865F2,#7c3aed);
color:white;
box-shadow:0 0 40px rgba(88,101,242,0.4);
}

.primary:active{
transform:scale(0.92);
}

.secondary{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.2);
color:white;
}

.secondary:active{
transform:scale(0.92);
}

/* STEPS */
.step{
display:none;
}

.step.active{
display:block;
animation:fade 0.4s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

/* STATUS */
.status{
margin-top:20px;
font-size:13px;
color:#94a3b8;
}

.dot{
width:8px;
height:8px;
background:#22c55e;
border-radius:50%;
display:inline-block;
margin-right:6px;
box-shadow:0 0 10px #22c55e;
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="glow g1"></div>
<div class="glow g2"></div>

<div class="container">

<div class="card">

<h1>CoreBot</h1>
<p>Sistema de verificação seguro</p>

<!-- STEP 1 CAPTCHA -->
<div id="step1" class="step active">

<p>Confirma que és humano</p>

<div style="display:flex;justify-content:center;margin-top:20px;">
<div class="g-recaptcha" data-sitekey="YOUR_SITE_KEY"></div>
</div>

<div class="buttons">
<button class="btn primary" onclick="verifyCaptcha()">Continuar</button>
</div>

</div>

<!-- STEP 2 LOGIN -->
<div id="step2" class="step">

<p>Agora faz login com Discord</p>

<div class="buttons">

<a class="btn primary"
onclick="goLogin()">
🔐 Login Discord
</a>

<a class="btn secondary"
onclick="addBot()">
➕ Adicionar Bot
</a>

</div>

</div>

<!-- STEP 3 DASHBOARD -->
<div id="step3" class="step">

<div class="status">
<span class="dot"></span> Acesso autorizado
</div>

<p style="margin-top:20px;">Bem-vindo ao CoreBot</p>

<div class="buttons">

<a class="btn primary"
onclick="addBot()">
➕ Adicionar ao Servidor
</a>

<a class="btn secondary"
onclick="alert('Dashboard em desenvolvimento')">
⚙ Dashboard
</a>

</div>

</div>

</div>

</div>

<script>

function verifyCaptcha(){
let response = grecaptcha.getResponse();

if(response.length === 0){
alert("Completa o CAPTCHA primeiro");
return;
}

document.getElementById("step1").classList.remove("active");
document.getElementById("step2").classList.add("active");
}

function goLogin(){
window.location.href =
"https://discord.com/oauth2/authorize?client_id=1500189077818052662&response_type=code&scope=identify%20guilds";
}

function addBot(){
window.open(
"https://discord.com/oauth2/authorize?client_id=1500189077818052662&permissions=8&scope=bot"
);
document.getElementById("step2").classList.remove("active");
document.getElementById("step3").classList.add("active");
}

</script>

</body>
</html>
