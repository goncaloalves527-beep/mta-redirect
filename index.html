<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CoreBot • Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050816;
color:white;
overflow:hidden;
}

/* BACKGROUND */
.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%,#5865F2 0%,transparent 40%),
radial-gradient(circle at 80% 80%,#7c3aed 0%,transparent 40%),
radial-gradient(circle at center,#00c2ff 0%,transparent 60%),
#050816;
z-index:-3;
}

/* GLOW */
.glow{
position:absolute;
filter:blur(220px);
opacity:0.25;
border-radius:50%;
}

.g1{width:500px;height:500px;background:#5865F2;top:-200px;left:-200px;}
.g2{width:500px;height:500px;background:#7c3aed;bottom:-200px;right:-200px;}

/* CENTER */
.container{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

/* CARD */
.card{
width:950px;
padding:75px 60px;
border-radius:30px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(30px);
border:1px solid rgba(255,255,255,0.12);
box-shadow:0 50px 140px rgba(0,0,0,0.7);
text-align:center;
transform:perspective(1000px) rotateX(5deg);
animation:float 6s ease-in-out infinite;
overflow:hidden;
position:relative;
}

/* SHINE */
.card::before{
content:'';
position:absolute;
top:-50%;
left:-50%;
width:200%;
height:200%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.08),transparent);
transform:rotate(25deg);
animation:shine 6s linear infinite;
}

@keyframes shine{
0%{transform:translateX(-100%) rotate(25deg);}
100%{transform:translateX(100%) rotate(25deg);}
}

@keyframes float{
0%{transform:translateY(0) perspective(1000px) rotateX(5deg);}
50%{transform:translateY(-12px) perspective(1000px) rotateX(5deg);}
100%{transform:translateY(0) perspective(1000px) rotateX(5deg);}
}

/* TITLE */
h1{
font-size:85px;
font-weight:900;
background:linear-gradient(90deg,#5865F2,#7c3aed,#00c2ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* TEXT */
p{
margin-top:10px;
font-size:18px;
color:#cbd5e1;
}

/* BUTTONS */
.buttons{
margin-top:30px;
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

.btn{
padding:14px 30px;
border-radius:14px;
font-weight:600;
text-decoration:none;
transition:0.3s;
display:inline-block;
font-size:15px;
cursor:pointer;
}

/* PRIMARY */
.primary{
background:linear-gradient(90deg,#5865F2,#7c3aed);
color:white;
box-shadow:0 0 40px rgba(88,101,242,0.4);
}

.primary:hover{
transform:translateY(-5px);
box-shadow:0 0 70px rgba(88,101,242,0.8);
}

/* SECONDARY */
.secondary{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.2);
color:white;
}

.secondary:hover{
transform:translateY(-5px);
border-color:#5865F2;
}

/* DASHBOARD */
.dashboard{
margin-top:40px;
display:none;
}

/* STATS */
.stats{
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
margin-top:25px;
}

.stat{
padding:25px;
min-width:250px;
border-radius:15px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
}

.stat h2{
font-size:42px;
color:#5865F2;
}

/* STATUS */
.status{
margin-top:20px;
font-size:13px;
color:#94a3b8;
}

.dot{
width:8px;
height:8px;
background:#22c55e;
border-radius:50%;
display:inline-block;
margin-right:6px;
box-shadow:0 0 10px #22c55e;
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="glow g1"></div>
<div class="glow g2"></div>

<div class="container">

<div class="card">

<h1>CoreBot</h1>

<p>Sistema de verificação e gestão Discord</p>

<!-- LOGIN -->
<div id="login">

<div class="buttons">

<a class="btn primary"
href="https://discord.com/oauth2/authorize?client_id=1500189077818052662&response_type=code&scope=identify%20guilds">
🔐 Login Discord
</a>

<a class="btn secondary"
href="https://discord.com/oauth2/authorize?client_id=1500189077818052662&permissions=8&scope=bot">
➕ Adicionar Bot
</a>

</div>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">

<div class="status">
<span class="dot"></span> Utilizador autenticado
</div>

<div class="stats">

<div class="stat">
<h2 id="servers">127</h2>
<p>Servidores do Bot</p>
</div>

<div class="stat">
<h2>Online</h2>
<p>Status</p>
</div>

<div class="stat">
<h2>CoreBot</h2>
<p>Dashboard</p>
</div>

</div>

<div class="buttons">

<a class="btn primary"
href="https://discord.com/oauth2/authorize?client_id=1500189077818052662&permissions=8&scope=bot">
➕ Adicionar ao Servidor
</a>

</div>

</div>

</div>

</div>

<script>

/* SIMULA LOGIN (UI ONLY) */
setTimeout(()=>{
document.getElementById("login").style.display="none";
document.getElementById("dashboard").style.display="block";
},1500);

</script>

</body>
</html>
