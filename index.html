<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CoreBot • Interactive UI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050816;
color:white;
overflow:hidden;
}

/* BACKGROUND */
.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%,#5865F2 0%,transparent 40%),
radial-gradient(circle at 80% 80%,#7c3aed 0%,transparent 40%),
radial-gradient(circle at center,#00c2ff 0%,transparent 60%),
#050816;
z-index:-3;
}

/* GLOW */
.glow{
position:absolute;
filter:blur(220px);
opacity:0.25;
border-radius:50%;
}

.g1{width:500px;height:500px;background:#5865F2;top:-200px;left:-200px;}
.g2{width:500px;height:500px;background:#7c3aed;bottom:-200px;right:-200px;}

/* CONTAINER */
.container{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

/* CARD */
.card{
width:900px;
padding:80px 60px;
border-radius:30px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(30px);
border:1px solid rgba(255,255,255,0.12);
box-shadow:0 50px 140px rgba(0,0,0,0.7);
text-align:center;
transform:perspective(1000px) rotateX(5deg);
animation:float 6s ease-in-out infinite;
position:relative;
overflow:hidden;
}

@keyframes float{
0%{transform:translateY(0) perspective(1000px) rotateX(5deg);}
50%{transform:translateY(-12px) perspective(1000px) rotateX(5deg);}
100%{transform:translateY(0) perspective(1000px) rotateX(5deg);}
}

/* TITLE */
h1{
font-size:85px;
font-weight:900;
background:linear-gradient(90deg,#5865F2,#7c3aed,#00c2ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* TEXT */
p{
margin-top:10px;
font-size:18px;
color:#cbd5e1;
}

/* BUTTONS */
.buttons{
margin-top:30px;
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

.btn{
padding:14px 30px;
border-radius:14px;
font-weight:600;
text-decoration:none;
font-size:15px;
transition:0.2s;
display:inline-block;
cursor:pointer;
user-select:none;
position:relative;
}

/* CLICK EFFECT */
.btn:active{
transform:scale(0.92);
}

/* PRIMARY BUTTON */
.primary{
background:linear-gradient(90deg,#5865F2,#7c3aed);
color:white;
box-shadow:0 0 40px rgba(88,101,242,0.4);
}

.primary:hover{
transform:translateY(-4px);
box-shadow:0 0 70px rgba(88,101,242,0.8);
}

/* SECONDARY */
.secondary{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.2);
color:white;
}

.secondary:hover{
transform:translateY(-4px);
border-color:#5865F2;
}

/* DASHBOARD */
.dashboard{
margin-top:40px;
display:none;
animation:fade 0.5s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

/* STATUS */
.status{
margin-top:20px;
font-size:13px;
color:#94a3b8;
}

.dot{
width:8px;
height:8px;
background:#22c55e;
border-radius:50%;
display:inline-block;
margin-right:6px;
box-shadow:0 0 10px #22c55e;
}

/* TOAST */
.toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
padding:12px 20px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.1);
opacity:0;
transition:0.3s;
}

.toast.show{
opacity:1;
bottom:50px;
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="glow g1"></div>
<div class="glow g2"></div>

<div class="container">

<div class="card">

<h1>CoreBot</h1>

<p>Sistema de verificação Discord moderno</p>

<!-- LOGIN -->
<div id="login">

<div class="buttons">

<a class="btn primary" onclick="clickLogin()">
🔐 Login Discord
</a>

<a class="btn secondary" onclick="clickAdd()">
➕ Adicionar Bot
</a>

</div>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">

<div class="status">
<span class="dot"></span> Utilizador autenticado
</div>

<p style="margin-top:20px;">Bem-vindo ao painel CoreBot</p>

<div class="buttons">

<a class="btn primary" onclick="clickAdd()">
➕ Adicionar ao Servidor
</a>

<a class="btn secondary" onclick="clickDash()">
⚙ Dashboard
</a>

</div>

</div>

</div>

</div>

<!-- TOAST -->
<div id="toast" class="toast">Ação executada</div>

<script>

function showToast(text){
let t=document.getElementById("toast");
t.innerText=text;
t.classList.add("show");

setTimeout(()=>{
t.classList.remove("show");
},2000);
}

/* LOGIN */
function clickLogin(){
showToast("Redirecionando para Discord...");
setTimeout(()=>{
document.getElementById("login").style.display="none";
document.getElementById("dashboard").style.display="block";
},1200);
}

/* ADD BOT */
function clickAdd(){
showToast("A abrir convite do bot...");
window.open("https://discord.com/oauth2/authorize?client_id=1500189077818052662&permissions=8&scope=bot");
}

/* DASHBOARD */
function clickDash(){
showToast("Dashboard em construção...");
}

</script>

</body>
</html>
