<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CoreBot • Verify</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050816;
color:white;
overflow:hidden;
}

/* BACKGROUND 3D */
.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at 25% 25%,#5865F2 0%,transparent 40%),
radial-gradient(circle at 75% 75%,#7c3aed 0%,transparent 40%),
radial-gradient(circle at center,#00c2ff 0%,transparent 60%),
#050816;
z-index:-2;
}

/* GLOW */
.glow{
position:absolute;
filter:blur(200px);
opacity:0.3;
border-radius:50%;
}

.g1{
width:500px;
height:500px;
background:#5865F2;
top:-180px;
left:-180px;
}

.g2{
width:500px;
height:500px;
background:#7c3aed;
bottom:-180px;
right:-180px;
}

/* CENTER */
.container{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

/* GLASS CARD */
.card{
max-width:900px;
text-align:center;
padding:85px 50px;
border-radius:30px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 30px 120px rgba(0,0,0,0.6);
transform:perspective(1000px) rotateX(6deg);
animation:float 5s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0) perspective(1000px) rotateX(6deg);}
50%{transform:translateY(-12px) perspective(1000px) rotateX(6deg);}
100%{transform:translateY(0) perspective(1000px) rotateX(6deg);}
}

/* TITLE */
h1{
font-size:95px;
font-weight:900;
background:linear-gradient(90deg,#5865F2,#7c3aed,#00c2ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* TEXT */
p{
margin-top:18px;
font-size:19px;
color:#cbd5e1;
line-height:1.7;
max-width:750px;
margin-inline:auto;
}

/* BUTTONS */
.buttons{
margin-top:40px;
}

.btn{
display:inline-block;
padding:15px 34px;
margin:10px;
border-radius:14px;
font-weight:600;
text-decoration:none;
font-size:16px;
transition:0.3s;
}

.primary{
background:linear-gradient(90deg,#5865F2,#7c3aed);
color:white;
box-shadow:0 0 35px rgba(88,101,242,0.5);
}

.primary:hover{
transform:translateY(-6px);
box-shadow:0 0 60px rgba(88,101,242,0.8);
}

.secondary{
border:1px solid rgba(255,255,255,0.2);
background:rgba(255,255,255,0.05);
color:white;
}

.secondary:hover{
transform:translateY(-6px);
border-color:#5865F2;
}

/* SMALL TEXT */
.small{
margin-top:25px;
font-size:13px;
color:#94a3b8;
}

</style>

</head>

<body>

<div class="bg"></div>

<div class="glow g1"></div>
<div class="glow g2"></div>

<div class="container">

<div class="card">

<h1>CoreBot</h1>

<p>
Sistema de verificação moderno para Discord.
Autenticação segura + controlo de acesso + proteção de servidores.
</p>

<div class="buttons">

<!-- ADD BOT -->
<a class="btn primary"
href="https://discord.com/oauth2/authorize?client_id=1500189077818052662&permissions=8&scope=bot">
➕ Adicionar Bot
</a>

<!-- VERIFY / LOGIN -->
<a class="btn secondary"
href="https://discord.com/oauth2/authorize?client_id=1500189077818052662&permissions=8&scope=bot">
🔐 Login / Verificar Discord
</a>

</div>

<div class="small">
Sistema de verificação via autorização Discord
</div>

</div>

</div>

</body>
</html>
