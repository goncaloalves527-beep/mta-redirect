<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CoreBot • Discord Bot</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050816;
color:white;
overflow:hidden;
}

/* BACKGROUND 3D */
.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%,#5865F2 0%,transparent 40%),
radial-gradient(circle at 80% 80%,#7c3aed 0%,transparent 40%),
radial-gradient(circle at center,#00c2ff 0%,transparent 55%),
#050816;
z-index:-2;
}

/* GLOW */
.glow{
position:absolute;
filter:blur(180px);
opacity:0.3;
border-radius:50%;
}

.g1{
width:500px;
height:500px;
background:#5865F2;
top:-150px;
left:-150px;
}

.g2{
width:500px;
height:500px;
background:#7c3aed;
bottom:-150px;
right:-150px;
}

/* CENTER CARD */
.container{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

/* GLASS BOX */
.box{
max-width:1000px;
text-align:center;
padding:80px 50px;
border-radius:30px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 30px 120px rgba(0,0,0,0.6);
transform:perspective(1000px) rotateX(6deg);
animation:float 5s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0) perspective(1000px) rotateX(6deg);}
50%{transform:translateY(-12px) perspective(1000px) rotateX(6deg);}
100%{transform:translateY(0) perspective(1000px) rotateX(6deg);}
}

/* TITLE */
h1{
font-size:100px;
font-weight:900;
background:linear-gradient(90deg,#5865F2,#7c3aed,#00c2ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* TEXT */
p{
margin-top:20px;
font-size:20px;
color:#cbd5e1;
line-height:1.7;
max-width:800px;
margin-inline:auto;
}

/* BUTTONS */
.buttons{
margin-top:40px;
}

.btn{
display:inline-block;
padding:15px 35px;
margin:10px;
border-radius:14px;
font-weight:600;
text-decoration:none;
transition:0.3s;
font-size:17px;
}

.primary{
background:linear-gradient(90deg,#5865F2,#7c3aed);
color:white;
box-shadow:0 0 30px rgba(88,101,242,0.4);
}

.primary:hover{
transform:translateY(-6px);
box-shadow:0 0 50px rgba(88,101,242,0.7);
}

.secondary{
border:1px solid rgba(255,255,255,0.2);
background:rgba(255,255,255,0.05);
color:white;
}

.secondary:hover{
transform:translateY(-6px);
border-color:#5865F2;
}

/* SMALL TEXT */
.small{
margin-top:25px;
font-size:13px;
color:#94a3b8;
}

</style>

</head>

<body>

<div class="bg"></div>

<div class="glow g1"></div>
<div class="glow g2"></div>

<div class="container">

<div class="box">

<h1>CoreBot</h1>

<p>
Bot Discord moderno com música, tickets, verify, logs e automod.
Interface premium 3D criada para comunidades profissionais.
</p>

<div class="buttons">

<!-- BOT INVITE (O TEU LINK) -->
<a class="btn primary"
href="https://discord.com/oauth2/authorize?client_id=1500189077818052662&permissions=8&scope=bot">
➕ Adicionar Bot
</a>

<!-- MESMO LINK (não é login real, mas pediste assim) -->
<a class="btn secondary"
href="https://discord.com/oauth2/authorize?client_id=1500189077818052662&permissions=8&scope=bot">
🔐 Login Discord
</a>

</div>

<div class="small">
⚠ Este login usa autorização do Discord (bot invite link)
</div>

</div>

</div>

</body>
</html>
