<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CoreBot • Secure Access</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050816;
color:white;
overflow:hidden;
}

/* BACKGROUND */
.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%,#5865F2 0%,transparent 40%),
radial-gradient(circle at 80% 80%,#7c3aed 0%,transparent 40%),
radial-gradient(circle at center,#00c2ff 0%,transparent 60%),
#050816;
z-index:-2;
}

/* GLOW */
.glow{
position:absolute;
filter:blur(200px);
opacity:0.25;
border-radius:50%;
}

.g1{width:500px;height:500px;background:#5865F2;top:-200px;left:-200px;}
.g2{width:500px;height:500px;background:#7c3aed;bottom:-200px;right:-200px;}

/* CENTER */
.container{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

/* CARD */
.card{
width:900px;
padding:80px 60px;
border-radius:30px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(30px);
border:1px solid rgba(255,255,255,0.12);
box-shadow:0 40px 120px rgba(0,0,0,0.7);
text-align:center;
transform:perspective(1000px) rotateX(6deg);
animation:float 6s ease-in-out infinite;
position:relative;
overflow:hidden;
}

@keyframes float{
0%{transform:translateY(0) perspective(1000px) rotateX(6deg);}
50%{transform:translateY(-12px) perspective(1000px) rotateX(6deg);}
100%{transform:translateY(0) perspective(1000px) rotateX(6deg);}
}

/* TITLE */
h1{
font-size:85px;
font-weight:900;
background:linear-gradient(90deg,#5865F2,#7c3aed,#00c2ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* TEXT */
p{
margin-top:15px;
font-size:18px;
color:#cbd5e1;
}

/* BUTTONS */
.btn{
display:inline-block;
margin-top:30px;
padding:15px 35px;
border-radius:14px;
text-decoration:none;
font-weight:600;
transition:0.3s;
cursor:pointer;
}

/* PRIMARY */
.primary{
background:linear-gradient(90deg,#5865F2,#7c3aed);
color:white;
box-shadow:0 0 40px rgba(88,101,242,0.4);
}

.primary:hover{
transform:translateY(-6px);
}

/* SECONDARY */
.secondary{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.2);
color:white;
}

.secondary:hover{
transform:translateY(-6px);
border-color:#5865F2;
}

/* HIDDEN CONTENT */
.hidden{
display:none;
}

/* STATUS */
.status{
margin-top:20px;
font-size:13px;
color:#94a3b8;
}

.dot{
width:8px;
height:8px;
background:#22c55e;
border-radius:50%;
display:inline-block;
margin-right:6px;
box-shadow:0 0 10px #22c55e;
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="glow g1"></div>
<div class="glow g2"></div>

<div class="container">

<div class="card">

<!-- LOGIN VIEW -->
<div id="loginView">

<h1>CoreBot</h1>

<p>Faça login com Discord para continuar</p>

<a class="btn primary"
onclick="login()">
🔐 Login Discord
</a>

</div>

<!-- MAIN VIEW -->
<div id="mainView" class="hidden">

<h1>CoreBot</h1>

<p>Sistema desbloqueado com sucesso</p>

<div class="status">
<span class="dot"></span> Utilizador autenticado
</div>

<a class="btn primary"
href="https://discord.com/oauth2/authorize?client_id=1500189077818052662&permissions=8&scope=bot">
➕ Adicionar Bot
</a>

<a class="btn secondary"
href="#">
⚙ Dashboard
</a>

</div>

</div>

</div>

<script>

function login(){

// simulação de login
document.getElementById("loginView").style.display="none";
document.getElementById("mainView").style.display="block";

}

</script>

</body>
</html>
