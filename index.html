<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CoreBot</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050816;
color:white;
overflow-x:hidden;
}

/* BACKGROUND */
.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%,#5865F2 0%,transparent 40%),
radial-gradient(circle at 80% 80%,#7c3aed 0%,transparent 40%),
#050816;
z-index:-2;
}

/* CONTAINER */
.container{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

/* CARD */
.card{
width:100%;
max-width:900px;
padding:40px 25px;
border-radius:25px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.12);
box-shadow:0 30px 100px rgba(0,0,0,0.6);
text-align:center;
animation:float 5s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-8px);}
100%{transform:translateY(0);}
}

/* TITLE */
h1{
font-size:50px;
font-weight:900;
background:linear-gradient(90deg,#5865F2,#7c3aed);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* TEXT */
p{
margin-top:10px;
font-size:15px;
color:#cbd5e1;
}

/* BUTTONS */
.buttons{
margin-top:25px;
display:flex;
flex-direction:column;
gap:12px;
}

.btn{
padding:14px;
border-radius:12px;
font-weight:600;
text-decoration:none;
font-size:15px;
transition:0.2s;
cursor:pointer;
}

.primary{
background:linear-gradient(90deg,#5865F2,#7c3aed);
color:white;
box-shadow:0 0 30px rgba(88,101,242,0.4);
}

.primary:active{
transform:scale(0.95);
}

.secondary{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.2);
color:white;
}

.secondary:active{
transform:scale(0.95);
}

/* DASHBOARD */
.dashboard{
display:none;
margin-top:20px;
animation:fade 0.3s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

/* STATUS */
.status{
font-size:12px;
color:#94a3b8;
margin-top:10px;
}

.dot{
width:8px;
height:8px;
background:#22c55e;
border-radius:50%;
display:inline-block;
margin-right:5px;
box-shadow:0 0 10px #22c55e;
}

/* GUILDS */
.guilds{
margin-top:20px;
display:grid;
grid-template-columns:1fr;
gap:10px;
}

.guild{
padding:12px;
border-radius:10px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<div class="card">

<h1>CoreBot</h1>

<p>Discord Dashboard moderno</p>

<!-- LOGIN -->
<div id="login">

<div class="buttons">

<a class="btn primary"
href="https://discord.com/oauth2/authorize?client_id=1500189077818052662&response_type=code&scope=identify%20guilds">
🔐 Login Discord
</a>

<a class="btn secondary"
href="https://discord.com/oauth2/authorize?client_id=1500189077818052662&permissions=8&scope=bot">
➕ Adicionar Bot
</a>

</div>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">

<div class="status">
<span class="dot"></span> Sessão ativa
</div>

<p style="margin-top:15px;">Bem-vindo ao painel</p>

<div class="guilds">

<div class="guild">Servidor Discord</div>
<div class="guild">Servidor Comunidade</div>
<div class="guild">Servidor Gaming</div>

</div>

<div class="buttons">

<a class="btn primary"
href="https://discord.com/oauth2/authorize?client_id=1500189077818052662&permissions=8&scope=bot">
➕ Adicionar Bot
</a>

<a class="btn secondary"
onclick="alert('Dashboard em construção')">
⚙ Dashboard
</a>

</div>

</div>

</div>

</div>

<script>

/* simulação login */
setTimeout(()=>{
document.getElementById("login").style.display="none";
document.getElementById("dashboard").style.display="block";
},1400);

</script>

</body>
</html>
