<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CoreBot • Verify</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050816;
color:white;
overflow:hidden;
}

/* BACKGROUND */
.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%,#5865F2 0%,transparent 40%),
radial-gradient(circle at 80% 80%,#7c3aed 0%,transparent 40%),
radial-gradient(circle at center,#00c2ff 0%,transparent 60%),
#050816;
z-index:-2;
}

/* GLOW */
.glow{
position:absolute;
filter:blur(200px);
opacity:0.25;
border-radius:50%;
}

.g1{width:500px;height:500px;background:#5865F2;top:-200px;left:-200px;}
.g2{width:500px;height:500px;background:#7c3aed;bottom:-200px;right:-200px;}

/* CENTER */
.container{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

/* CARD */
.card{
width:850px;
padding:80px;
border-radius:30px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 40px 120px rgba(0,0,0,0.6);
text-align:center;
animation:float 5s ease-in-out infinite;
transform:perspective(1000px) rotateX(6deg);
}

@keyframes float{
0%{transform:translateY(0) perspective(1000px) rotateX(6deg);}
50%{transform:translateY(-12px) perspective(1000px) rotateX(6deg);}
100%{transform:translateY(0) perspective(1000px) rotateX(6deg);}
}

/* TITLE */
h1{
font-size:85px;
font-weight:900;
background:linear-gradient(90deg,#5865F2,#7c3aed,#00c2ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* TEXT */
p{
margin-top:15px;
font-size:18px;
color:#cbd5e1;
line-height:1.7;
}

/* BUTTONS */
.btn{
display:inline-block;
margin-top:30px;
padding:15px 35px;
border-radius:14px;
text-decoration:none;
font-weight:600;
transition:0.3s;
font-size:16px;
}

.primary{
background:linear-gradient(90deg,#5865F2,#7c3aed);
color:white;
box-shadow:0 0 35px rgba(88,101,242,0.4);
}

.primary:hover{
transform:translateY(-6px);
box-shadow:0 0 60px rgba(88,101,242,0.8);
}

/* SPACING */
.space{
margin-top:20px;
}

</style>

</head>

<body>

<div class="bg"></div>
<div class="glow g1"></div>
<div class="glow g2"></div>

<div class="container">

<div class="card">

<h1>CoreBot</h1>

<p>
Sistema de verificação Discord seguro.
Autenticação + controlo de acesso + proteção de servidores.
</p>

<!-- VERIFICAÇÃO -->
<a class="btn primary"
href="https://discord.com/oauth2/authorize?client_id=1500189077818052662&response_type=code&scope=identify%20guilds">
🔐 Login Discord
</a>

<div class="space"></div>

<!-- ADD BOT -->
<a class="btn primary"
href="https://discord.com/oauth2/authorize?client_id=1500189077818052662&permissions=8&scope=bot">
➕ Adicionar Bot
</a>

</div>

</div>

</body>
</html>
