<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoreBot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Pacifico&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Fredoka', sans-serif;
      background: #1da1ff;
      overflow-x: hidden;
      color: white;
    }

    .background {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.08) 2px, transparent 3px),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,0.08) 2px, transparent 3px),
        radial-gradient(circle at 60% 70%, rgba(255,255,255,0.08) 2px, transparent 3px),
        linear-gradient(135deg, #1ea2ff, #1585d8);
      background-size: 120px 120px, 180px 180px, 150px 150px, cover;
      z-index: -1;
    }

    header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 50px;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.08);
      backdrop-filter: blur(10px);
    }

    .logo {
      font-size: 2rem;
      font-weight: 700;
      color: white;
    }

    nav {
      display: flex;
      gap: 25px;
      align-items: center;
    }

    nav a {
      text-decoration: none;
      color: white;
      font-weight: 600;
      transition: 0.3s;
    }

    nav a:hover {
      color: #d4efff;
      transform: translateY(-2px);
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 120px 80px 50px;
      gap: 50px;
    }

    .character {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .bot-card {
      width: 420px;
      height: 420px;
      border-radius: 50px;
      background: rgba(255,255,255,0.12);
      border: 4px solid rgba(255,255,255,0.2);
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      position: relative;
      overflow: hidden;
    }

    .bot-card::before {
      content: '';
      position: absolute;
      width: 250px;
      height: 250px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
      top: -60px;
      right: -60px;
    }

    .bot-face {
      width: 200px;
      height: 200px;
      background: white;
      border-radius: 40px;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .eyes {
      display: flex;
      gap: 40px;
      margin-bottom: 20px;
    }

    .eye {
      width: 24px;
      height: 24px;
      background: #1da1ff;
      border-radius: 50%;
    }

    .mouth {
      width: 60px;
      height: 12px;
      border-radius: 20px;
      background: #1da1ff;
    }

    .hero-text {
      flex: 1;
    }

    .hero-text h2 {
      font-size: 3rem;
      font-family: 'Pacifico', cursive;
      margin-bottom: 10px;
    }

    .hero-text h1 {
      font-size: 6rem;
      color: #80d9ff;
      line-height: 1;
      margin-bottom: 20px;
    }

    .hero-text p {
      font-size: 1.8rem;
      margin-bottom: 35px;
      color: #eef9ff;
    }

    .buttons {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 16px 30px;
      border-radius: 15px;
      text-decoration: none;
      color: white;
      font-size: 1.1rem;
      font-weight: 700;
      transition: 0.3s;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    .btn:hover {
      transform: translateY(-5px) scale(1.03);
    }

    .btn-primary {
      background: linear-gradient(135deg, #ff3ca5, #ff0080);
    }

    .btn-secondary {
      background: linear-gradient(135deg, #3cff8e, #00c85f);
    }

    .btn-panel {
      background: linear-gradient(135deg, #9f4dff, #6b00ff);
    }

    .features {
      padding: 100px 80px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
    }

    .feature {
      background: rgba(255,255,255,0.12);
      padding: 30px;
      border-radius: 25px;
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255,255,255,0.15);
      transition: 0.3s;
    }

    .feature:hover {
      transform: translateY(-8px);
    }

    .feature h3 {
      font-size: 1.6rem;
      margin-bottom: 15px;
    }
